# Coolify (recomendado): solo descarga imágenes — NO compila en el VPS.
# Requiere GitHub Actions (.github/workflows/docker-publish.yml) y registry configurado.
#
# En Coolify → Docker Compose → "Compose file": docker-compose.coolify.yml
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-progress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-progress_sheet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-progress} -d ${POSTGRES_DB:-progress_sheet}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE (e.g. ghcr.io/user/progress-sheet-backend:latest)}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-progress}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-progress_sheet}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    expose:
      - "3001"

  web:
    image: ${WEB_IMAGE:?Set WEB_IMAGE (e.g. ghcr.io/user/progress-sheet-web:latest)}
    pull_policy: always
    restart: unless-stopped
    environment:
      # Ruta base del API en el mismo dominio que la web (proxy Coolify: /api → backend)
      API_BASE_URL: ${API_BASE_URL:-/api}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "3000"

volumes:
  postgres_data:
