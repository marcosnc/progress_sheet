# Builds backend + web on GitHub runners and pushes to GHCR.
# Coolify only pulls images (docker-compose.coolify.yml) — no compile on your VPS.
name: Publish Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner for GHCR
        id: meta
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER}/progress-sheet-backend" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.REGISTRY }}/${OWNER}/progress-sheet-web" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:latest
            ${{ steps.meta.outputs.web_image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            CACHE_BUST=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Images published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.backend_image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.web_image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
