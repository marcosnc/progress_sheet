# Local / build on server: one Dockerfile, shared layers between backend and web.
# Build serially to avoid 200% CPU: COMPOSE_PARALLEL_LIMIT=1 docker compose build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-progress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-progress_sheet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-progress} -d ${POSTGRES_DB:-progress_sheet}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-progress}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-progress_sheet}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:3001/api}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001/api}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
